# github action workflow to build
#push docker image on push to main
name: Build and Push Docker Image

#add trigger manually to run the workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:
      
jobs:
  build-and-push: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          #tags: ${{ secrets.DOCKER_USERNAME }}/my-app-from-github-action:v1.0.0
          tags: ${{ secrets.DOCKER_USERNAME }}/my-app-from-github-action:${{ github.sha }},${{ secrets.DOCKER_USERNAME }}/express-app:latest